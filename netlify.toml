[build]
  functions = "netlify/functions"
  command = "npm install"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES"

[[redirects]]
  from = "/api/analyze"
  to   = "/.netlify/functions/analyze"
  status = 200

[[redirects]]
  from = "/api/search"
  to   = "/.netlify/functions/search"
  status = 200

[[redirects]]
  from = "/api/threats"
  to   = "/.netlify/functions/threats"
  status = 200

[[redirects]]
  from = "/api/report"
  to   = "/.netlify/functions/report"
  status = 200

[[redirects]]
  from = "/api/dashboard-data"
  to   = "/.netlify/functions/dashboard-data"
  status = 200

[[redirects]]
  from = "/api/lookup"
  to   = "/.netlify/functions/api-lookup"
  status = 200

[[redirects]]
  from = "/api/feedback"
  to   = "/.netlify/functions/feedback"
  status = 200

[[redirects]]
  from = "/api/track"
  to   = "/.netlify/functions/track"
  status = 200

[[headers]]
  for = "/.well-known/security.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
