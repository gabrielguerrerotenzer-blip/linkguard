[build]
  functions = "netlify/functions"
  command = "npm install"

[[redirects]]
  from = "/api/threats"
  to   = "/.netlify/functions/threats"
  status = 200

[[redirects]]
  from = "/api/report"
  to   = "/.netlify/functions/report"
  status = 200

[[redirects]]
  from = "/api/dashboard-data"
  to   = "/.netlify/functions/dashboard-data"
  status = 200

[[redirects]]
  from = "/api/lookup"
  to   = "/.netlify/functions/api-lookup"
  status = 200

[[redirects]]
  from = "/api/feedback"
  to   = "/.netlify/functions/feedback"
  status = 200
