<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página no encontrada · fraude.uy</title>
<meta name="description" content="La página que buscás no existe en fraude.uy. Volvé al verificador para chequear si un mensaje es estafa.">
<meta name="robots" content="noindex">
<link rel="canonical" href="https://fraude.uy/">
<link rel="icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    background:#FAFAF7;color:#1A1A2E;
    display:flex;flex-direction:column;min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 20px}
  .card{
    max-width:520px;width:100%;text-align:center;
    background:#FFF;border:1px solid #E5E2DB;border-radius:16px;
    padding:48px 32px;
  }
  .brand{font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:24px}
  .brand .a{color:#7BB8E0}
  .brand .b{color:#F4D03F}
  .code{font-size:64px;font-weight:700;color:#6B6B80;line-height:1;margin-bottom:8px;font-family:Georgia,serif}
  h1{font-size:22px;font-weight:600;margin-bottom:12px;color:#1A1A2E}
  p{font-size:15px;color:#6B6B80;line-height:1.6;margin-bottom:28px}
  .cta-row{display:flex;flex-direction:column;gap:10px}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:14px 22px;border-radius:10px;font-size:15px;font-weight:600;
    text-decoration:none;transition:opacity .2s,transform .1s;
  }
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:#2D5A3D;color:#FFF}
  .btn-primary:hover{background:#234A30}
  .btn-secondary{background:transparent;color:#1A1A2E;border:1px solid #E5E2DB}
  .btn-secondary:hover{background:#F2F0EB}
  footer{
    text-align:center;padding:20px;font-size:13px;color:#6B6B80;
    border-top:1px solid #E5E2DB;background:#F2F0EB;
  }
  footer a{color:#2D5A3D;text-decoration:none}
  footer a:hover{text-decoration:underline}
  @media (max-width:480px){
    .card{padding:36px 20px}
    .code{font-size:52px}
    h1{font-size:19px}
    p{font-size:14px}
  }
</style>
</head>
<body>
  <main class="wrap">
    <div class="card">
      <div class="brand"><span class="a">fraude</span><span class="b">.uy</span></div>
      <div class="code">404</div>
      <h1>Esta página no existe</h1>
      <p>La dirección que abriste no está en fraude.uy. Puede que el link esté roto o que la página se haya movido.</p>
      <div class="cta-row">
        <a class="btn btn-primary" href="/#herramienta">🛡️ Ir al verificador</a>
        <a class="btn btn-secondary" href="/">Volver al inicio</a>
      </div>
    </div>
  </main>
  <footer>
    Proyecto ciudadano · Hecho en Uruguay 🇺🇾 ·
    <a href="mailto:contacto@fraude.uy">contacto@fraude.uy</a>
  </footer>
</body>
</html>
